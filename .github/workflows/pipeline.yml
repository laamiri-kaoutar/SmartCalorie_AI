name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Validate Logic & Math
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/tests/ -v -c backend/pytest.ini

  build-and-push:
    name: Package & Deploy to GHCR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ghcr.io/${{ toLower(github.repository) }}/backend:latest
