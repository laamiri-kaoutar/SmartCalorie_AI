services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: smartcalorie
      POSTGRES_PASSWORD: smartcalorie
      POSTGRES_DB: smartcalorie
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./artifacts:/app/artifacts
      - .:/project_root:ro
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      USDA_API_KEY: ${USDA_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    depends_on:
      - db
  mlflow:
    build:
      context: .
      dockerfile: monitoring/mlflow.Dockerfile
    container_name: smartcalorie_ai-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=mlflow,localhost,127.0.0.1,host.docker.internal,*
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --allowed-hosts '*' 
      --backend-store-uri postgresql://smartcalorie:smartcalorie@db:5432/smartcalorie 
      --default-artifact-root /mlflow/artifacts
    depends_on:
      - db
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
  prometheus:
    image: prom/prometheus
    container_name: smartcalorie_ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - backend
  grafana:
    image: grafana/grafana-oss
    container_name: smartcalorie_ai-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  
    environment:
      - CHOKIDAR_USEPOLLING=true


volumes:
  db_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
